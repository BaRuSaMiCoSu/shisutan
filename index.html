<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シス単 単語テストメーカー</title>
<!-- PDF生成ライブラリ (html2pdf.js = html2canvas + jsPDF)。
     HTMLを描画したまま画像としてPDF化するため、日本語が文字化けしません。 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --main: #2b6cb0;
    --main-dark: #1a4e85;
    --bg: #f0f4f8;
    --border: #cbd5e0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    background: var(--bg);
    color: #222;
    line-height: 1.6;
  }
  header {
    background: var(--main);
    color: #fff;
    padding: 14px 20px;
  }
  header h1 { margin: 0; font-size: 1.25rem; }
  header p  { margin: 2px 0 0; font-size: 0.8rem; opacity: 0.9; }
  main { max-width: 900px; margin: 0 auto; padding: 16px; }

  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    margin-bottom: 16px;
  }
  .card h2 {
    margin: 0 0 10px;
    font-size: 1rem;
    border-left: 4px solid var(--main);
    padding-left: 8px;
  }
  fieldset {
    border: 1px solid var(--border);
    border-radius: 6px;
    margin: 0 0 12px;
    padding: 8px 12px;
  }
  legend { font-size: 0.85rem; font-weight: bold; color: var(--main-dark); padding: 0 6px; }
  label { margin-right: 14px; font-size: 0.92rem; cursor: pointer; }
  input[type="number"] {
    width: 80px; padding: 4px 6px;
    border: 1px solid var(--border); border-radius: 4px; font-size: 0.95rem;
  }
  textarea {
    width: 100%; min-height: 110px;
    border: 1px solid var(--border); border-radius: 4px;
    padding: 8px; font-size: 0.85rem; font-family: inherit;
  }
  button {
    font-family: inherit;
    font-size: 0.95rem;
    padding: 9px 18px;
    border: none; border-radius: 6px;
    cursor: pointer;
  }
  .btn-primary { background: var(--main); color: #fff; }
  .btn-primary:hover { background: var(--main-dark); }
  .btn-secondary { background: #fff; color: var(--main-dark); border: 1px solid var(--main); }
  .btn-secondary:hover { background: #e8f0fa; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
  .note { font-size: 0.8rem; color: #666; }
  #wordCountInfo { font-size: 0.85rem; color: var(--main-dark); font-weight: bold; }
  details summary { cursor: pointer; font-weight: bold; font-size: 0.92rem; color: var(--main-dark); }

  /* ===== テスト用紙(画面プレビュー & PDF共通) ===== */
  #sheetWrap { display: none; }
  .paper {
    background: #fff;
    width: 210mm;
    min-height: 297mm;
    max-width: 100%;
    margin: 0 auto 16px;
    padding: 15mm 14mm;
    border: 1px solid var(--border);
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }
  .paper h3 {
    margin: 0 0 4px;
    font-size: 1.15rem;
    text-align: center;
    letter-spacing: 0.1em;
  }
  .paper .meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    border-bottom: 2px solid #222;
    padding-bottom: 6px;
    margin-bottom: 10px;
  }
  .paper .nameline { letter-spacing: 0.05em; }
  table.qtable {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }
  table.qtable th, table.qtable td {
    border: 1px solid #444;
    padding: 5px 8px;
    vertical-align: middle;
  }
  table.qtable th { background: #eef3f8; font-weight: bold; text-align: center; }
  td.qno { width: 34px; text-align: center; }
  td.qword { width: 42%; }
  td.qans { }
  .choices { font-size: 0.85rem; }
  .choices span { display: inline-block; margin-right: 14px; }
  .anskey { column-count: 2; column-gap: 28px; font-size: 0.85rem; }
  .anskey div { padding: 2px 0; border-bottom: 1px dotted #999; break-inside: avoid; }
  .page-break { page-break-before: always; }

  /* ===== 印刷時: 操作パネルを隠して用紙のみ出力 ===== */
  @media print {
    header, #controls, .btn-row, .no-print { display: none !important; }
    body { background: #fff; }
    main { max-width: none; padding: 0; }
    #sheetWrap { display: block !important; }
    .paper {
      border: none; box-shadow: none;
      width: auto; min-height: 0;
      margin: 0; padding: 0;
    }
  }
</style>
</head>
<body>
<header>
  <h1>シス単 単語テストメーカー</h1>
  <p>システム英単語レベルの単語からランダムにテストを作成し、PDFでダウンロードできます。</p>
</header>

<main>
  <div id="controls">
    <div class="card">
      <h2>出題設定</h2>

      <fieldset>
        <legend>単語リスト</legend>
        <label><input type="radio" name="listSrc" value="builtin" checked> 内蔵リスト(シス単レベル準拠)</label>
        <label><input type="radio" name="listSrc" value="custom"> カスタムリスト</label>
        <span id="wordCountInfo"></span>
        <details style="margin-top:8px;">
          <summary>カスタムリストの取り込み(サイトの表をコピペ)</summary>
          <p class="note">
            単語リストのページ(例: ukaru-eigo.com のシス単一覧表)で表を範囲選択してコピーし、
            下の欄に貼り付けて「読み込む」を押してください。<br>
            1行につき「番号(省略可) 英単語 意味」をタブ・カンマ・空白区切りで認識します。
            読み込んだリストはこのブラウザに保存されます。
          </p>
          <textarea id="customInput" placeholder="例:&#10;1&#9;follow&#9;〜について行く、〜に従う&#10;2&#9;consider&#9;〜をよく考える&#10;または&#10;follow,〜について行く"></textarea>
          <div class="btn-row">
            <button type="button" class="btn-secondary" id="btnImport">読み込む</button>
            <button type="button" class="btn-secondary" id="btnClearCustom">カスタムリストを削除</button>
          </div>
          <p class="note" id="importMsg"></p>
        </details>
      </fieldset>

      <fieldset id="stageFs">
        <legend>出題範囲(ステージ)</legend>
        <label><input type="checkbox" class="stageChk" value="1" checked> Stage 1(基礎)</label>
        <label><input type="checkbox" class="stageChk" value="2" checked> Stage 2(標準)</label>
        <label><input type="checkbox" class="stageChk" value="3"> Stage 3(難関)</label>
        <label><input type="checkbox" class="stageChk" value="4"> Stage 4(最難関)</label>
        <br>
        <label style="margin-top:6px; display:inline-block;">
          番号範囲: <input type="number" id="rangeFrom" min="1" placeholder="1">
          〜 <input type="number" id="rangeTo" min="1" placeholder="最後">
          <span class="note">(空欄なら全範囲)</span>
        </label>
      </fieldset>

      <fieldset>
        <legend>出題形式</legend>
        <label><input type="radio" name="mode" value="e2j" checked> 英語 → 日本語(記述)</label>
        <label><input type="radio" name="mode" value="j2e"> 日本語 → 英語(記述)</label>
        <label><input type="radio" name="mode" value="choice"> 英語 → 日本語(4択)</label>
      </fieldset>

      <fieldset>
        <legend>問題数・その他</legend>
        <label>問題数 <input type="number" id="numQ" min="1" max="100" value="20"></label>
        <label><input type="checkbox" id="withAnswer" checked> 解答ページを付ける</label>
        <label>タイトル <input type="text" id="testTitle" value="英単語テスト" style="padding:4px 6px; border:1px solid var(--border); border-radius:4px;"></label>
      </fieldset>

      <div class="btn-row">
        <button type="button" class="btn-primary" id="btnGenerate">テストを作成する</button>
      </div>
    </div>
  </div>

  <div id="sheetWrap">
    <div class="btn-row no-print" style="margin-bottom:12px;">
      <button type="button" class="btn-primary" id="btnPdf">PDFをダウンロード</button>
      <button type="button" class="btn-secondary" id="btnPrint">印刷(ブラウザのPDF保存も可)</button>
      <button type="button" class="btn-secondary" id="btnRegen">同じ設定で作り直す</button>
    </div>
    <div id="sheet"></div>
  </div>
</main>

/* 内蔵リストを {no, word, meaning, stage} の一覧に展開(通し番号を自動付与) */
const BUILTIN_WORDS = (() => {
  const list = [];
  let no = 1;
  for (const stage of [1, 2, 3, 4]) {
    for (const [word, meaning] of BUILTIN_STAGES[stage]) {
      list.push({ no: no++, word, meaning, stage });
    }
  }
  return list;
})();

const LS_KEY = "shisutan_custom_words";
let customWords = loadCustom();
let lastConfig = null; // 「同じ設定で作り直す」用

/* ---------------- カスタムリスト ---------------- */
function loadCustom() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch (e) {
    return [];
  }
}

function parseCustomText(text) {
  const words = [];
  let no = 1;
  for (const rawLine of text.split(/\r?\n/)) {
    const line = rawLine.trim();
    if (!line) continue;
    // タブ / カンマ / 連続空白 で分割
    let parts = line.split(/\t|,|、|\s{2,}/).map(s => s.trim()).filter(Boolean);
    if (parts.length < 2) {
      // 「word 意味」のような半角スペース1つ区切り(先頭が英字の場合のみ)
      const m = line.match(/^([A-Za-z][A-Za-z' .-]*)\s+(.+)$/);
      if (m) parts = [m[1], m[2]];
      else continue;
    }
    // 先頭が番号なら捨てて自前で振り直す
    if (/^\d+[.)]?$/.test(parts[0])) parts.shift();
    if (parts.length < 2) continue;
    const word = parts[0];
    const meaning = parts.slice(1).join(" ");
    if (!/[A-Za-z]/.test(word)) continue; // 英字を含まない行はヘッダ等とみなす
    words.push({ no: no++, word, meaning, stage: 0 });
  }
  return words;
}

/* ---------------- 出題プール ---------------- */
function getPool() {
  const src = document.querySelector('input[name="listSrc"]:checked').value;
  let pool;
  if (src === "custom") {
    pool = customWords.slice();
  } else {
    const stages = Array.from(document.querySelectorAll(".stageChk:checked")).map(c => Number(c.value));
    pool = BUILTIN_WORDS.filter(w => stages.includes(w.stage));
  }
  const from = Number(document.getElementById("rangeFrom").value) || 1;
  const toRaw = Number(document.getElementById("rangeTo").value);
  const to = toRaw > 0 ? toRaw : Infinity;
  return pool.filter(w => w.no >= from && w.no <= to);
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ---------------- テスト生成 ---------------- */
function generateTest() {
  const pool = getPool();
  if (pool.length === 0) {
    alert("出題できる単語がありません。リストや出題範囲の設定を確認してください。");
    return;
  }
  const mode = document.querySelector('input[name="mode"]:checked').value;
  if (mode === "choice" && pool.length < 4) {
    alert("4択形式には最低4語必要です。出題範囲を広げてください。");
    return;
  }
  let n = Math.max(1, Number(document.getElementById("numQ").value) || 20);
  if (n > pool.length) {
    n = pool.length;
    document.getElementById("numQ").value = n;
  }

  const questions = shuffle(pool).slice(0, n).map(w => {
    const q = { ...w };
    if (mode === "choice") {
      // 正解 + 他の単語の意味から誤答3つ
      const wrong = shuffle(pool.filter(x => x.no !== w.no)).slice(0, 3).map(x => x.meaning);
      q.choices = shuffle([w.meaning, ...wrong]);
      q.answerIndex = q.choices.indexOf(w.meaning);
    }
    return q;
  });

  lastConfig = true;
  renderSheet(questions, mode);
}

function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function renderSheet(questions, mode) {
  const title = document.getElementById("testTitle").value || "英単語テスト";
  const withAnswer = document.getElementById("withAnswer").checked;
  const today = new Date();
  const dateStr = `${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日`;
  const CIRCLED = ["①", "②", "③", "④"];

  const modeLabel = {
    e2j: "次の英単語の意味を日本語で書きなさい。",
    j2e: "次の日本語の意味を表す英単語を書きなさい。",
    choice: "次の英単語の意味として正しいものを1つ選び、番号で答えなさい。"
  }[mode];

  let rows = "";
  questions.forEach((q, i) => {
    if (mode === "e2j") {
      rows += `<tr><td class="qno">${i + 1}</td><td class="qword">${esc(q.word)}</td><td class="qans">&nbsp;</td></tr>`;
    } else if (mode === "j2e") {
      rows += `<tr><td class="qno">${i + 1}</td><td class="qword">${esc(q.meaning)}</td><td class="qans">&nbsp;</td></tr>`;
    } else {
      const ch = q.choices.map((c, k) => `<span>${CIRCLED[k]} ${esc(c)}</span>`).join("");
      rows += `<tr><td class="qno">${i + 1}</td><td class="qword"><b>${esc(q.word)}</b></td><td class="qans"><div class="choices">${ch}</div></td></tr>`;
    }
  });

  const ansHeader = mode === "choice" ? "解答欄" : (mode === "j2e" ? "英単語" : "意味");
  const qHeader = mode === "j2e" ? "日本語" : "英単語";

  let html = `
    <div class="paper" id="paperTest">
      <h3>${esc(title)}</h3>
      <div class="meta">
        <span>${dateStr}</span>
        <span class="nameline">年　　組　　番　氏名：＿＿＿＿＿＿＿＿＿＿＿＿　　点数：＿＿＿＿ / ${questions.length}</span>
      </div>
      <p style="font-size:0.9rem; margin:6px 0 10px;">【問題】${modeLabel}</p>
      <table class="qtable">
        <tr><th style="width:34px;">No.</th><th>${qHeader}</th><th>${ansHeader}</th></tr>
        ${rows}
      </table>
    </div>`;

  if (withAnswer) {
    let ansRows = "";
    questions.forEach((q, i) => {
      let ans;
      if (mode === "e2j") ans = `${esc(q.word)} … ${esc(q.meaning)}`;
      else if (mode === "j2e") ans = `${esc(q.meaning)} … <b>${esc(q.word)}</b>`;
      else ans = `${esc(q.word)} … ${CIRCLED[q.answerIndex]} ${esc(q.choices[q.answerIndex])}`;
      ansRows += `<div>${i + 1}. ${ans}</div>`;
    });
    html += `
    <div class="paper page-break" id="paperAnswer">
      <h3>${esc(title)}〈解答〉</h3>
      <div class="meta"><span>${dateStr}</span><span>全 ${questions.length} 問</span></div>
      <div class="anskey">${ansRows}</div>
    </div>`;
  }

  document.getElementById("sheet").innerHTML = html;
  document.getElementById("sheetWrap").style.display = "block";
  document.getElementById("sheetWrap").scrollIntoView({ behavior: "smooth" });
}

/* ---------------- PDF出力 ---------------- */
function downloadPdf() {
  if (typeof html2pdf === "undefined") {
    alert("PDFライブラリを読み込めませんでした(オフラインの可能性があります)。\n「印刷」ボタンからブラウザの[PDFに保存]をご利用ください。");
    return;
  }
  const sheet = document.getElementById("sheet");
  const d = new Date();
  const pad = x => String(x).padStart(2, "0");
  const fname = `単語テスト_${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}.pdf`;

  const btn = document.getElementById("btnPdf");
  btn.disabled = true;
  btn.textContent = "PDF作成中…";

  html2pdf().set({
    margin: [10, 8, 10, 8],
    filename: fname,
    image: { type: "jpeg", quality: 0.96 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
    pagebreak: { mode: ["css", "legacy"], before: ".page-break" }
  }).from(sheet).save().finally(() => {
    btn.disabled = false;
    btn.textContent = "PDFをダウンロード";
  });
}

/* ---------------- UI ---------------- */
function updateWordCountInfo() {
  const src = document.querySelector('input[name="listSrc"]:checked').value;
  const info = document.getElementById("wordCountInfo");
  if (src === "custom") {
    info.textContent = customWords.length > 0
      ? `カスタム: ${customWords.length} 語`
      : "カスタムリストは未登録です";
  } else {
    info.textContent = `内蔵: ${BUILTIN_WORDS.length} 語`;
  }
  // カスタム使用時はステージ選択を無効化
  const useCustom = src === "custom";
  document.querySelectorAll(".stageChk").forEach(c => { c.disabled = useCustom; });
}

document.getElementById("btnGenerate").addEventListener("click", generateTest);
document.getElementById("btnRegen").addEventListener("click", generateTest);
document.getElementById("btnPdf").addEventListener("click", downloadPdf);
document.getElementById("btnPrint").addEventListener("click", () => window.print());

document.querySelectorAll('input[name="listSrc"]').forEach(r =>
  r.addEventListener("change", updateWordCountInfo));

document.getElementById("btnImport").addEventListener("click", () => {
  const text = document.getElementById("customInput").value;
  const words = parseCustomText(text);
  const msg = document.getElementById("importMsg");
  if (words.length === 0) {
    msg.textContent = "読み込める行がありませんでした。「英単語 (区切り) 意味」の形式で貼り付けてください。";
    return;
  }
  customWords = words;
  localStorage.setItem(LS_KEY, JSON.stringify(words));
  document.querySelector('input[name="listSrc"][value="custom"]').checked = true;
  updateWordCountInfo();
  msg.textContent = `${words.length} 語を読み込みました。カスタムリストに切り替えました。`;
});

document.getElementById("btnClearCustom").addEventListener("click", () => {
  customWords = [];
  localStorage.removeItem(LS_KEY);
  document.querySelector('input[name="listSrc"][value="builtin"]').checked = true;
  updateWordCountInfo();
  document.getElementById("importMsg").textContent = "カスタムリストを削除しました。";
});

updateWordCountInfo();
</script>
